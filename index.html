<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.min.css">
    <title>Project MikaChan</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: url('https://static.mikachan.dpdns.org/oplist/background.png') center/cover no-repeat;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin: 20px;
            max-width: 90%;
            text-align: center;
        }

        .avatar {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
        }

        .icon, .twitter-icon, .telegram-icon, .bsky-icon {
            font-size: 24px;
        }
        
        .twitter-icon { color: #1DA1F2; }
        .telegram-icon { color: #0088CC; }
        .bsky-icon { color: #1185FE; }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 24px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }

        .page-link {
            color: #fa8c35;
            text-decoration: none;
            font-weight: bold;
            margin: 0 5px;
        }

        .page-link:hover {
            text-decoration: underline;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://static.mikachan.dpdns.org/project_mikachan.png" alt="Your Avatar" class="avatar">
        <p>We aim to create a free and accessible Internet for everyone. 🍭</p>
        
        <a href="https://twitter.com/mkcns_official" class="social-link" target="_blank">
            <i class="twitter-icon fab fa-twitter"></i>
            Twitter
        </a>
    </div>
    
    <p class="footer">
        Links：<a href="https://mihari.cyou" class="page-link" target="_blank">Akira's Mental World</a> | 
        <a href="https://github.com/MtFloveU/mtfloveu.github.io" class="page-link" target="_blank">Repository</a>
    </p>
</body>
</html>
